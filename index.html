<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>葳老闆感情諮詢室</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0c0a;
      --surface: #1a1512;
      --surface2: #231e19;
      --border: #3a2e25;
      --gold: #c9943a;
      --gold-light: #e8b96a;
      --gold-dim: #7a5a22;
      --red: #c0392b;
      --text: #e8ddd0;
      --text-dim: #9a8a78;
      --text-muted: #5a4e42;
      --user-bubble: #2a1f12;
      --boss-bubble: #1e1a16;
      --radius: 18px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 300;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      flex-shrink: 0;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px var(--gold-dim), 0 0 20px rgba(201,148,58,0.25);
      position: relative;
    }

    .avatar::after {
      content: '';
      position: absolute;
      bottom: 2px; right: 2px;
      width: 10px; height: 10px;
      background: #2ecc71;
      border-radius: 50%;
      border: 2px solid var(--surface);
    }

    .header-info h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 18px;
      font-weight: 900;
      color: var(--gold-light);
      letter-spacing: 0.05em;
    }

    .header-info p {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .header-badge {
      margin-left: auto;
      background: rgba(192,57,43,0.15);
      border: 1px solid rgba(192,57,43,0.4);
      color: #e74c3c;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    /* ── MESSAGES ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* welcome card */
    .welcome-card {
      background: linear-gradient(135deg, var(--surface2), var(--surface));
      border: 1px solid var(--gold-dim);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.6s ease both;
    }

    .welcome-card::before {
      content: '';
      position: absolute;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(201,148,58,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .welcome-card .big-avatar {
      width: 72px; height: 72px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      box-shadow: 0 0 0 3px var(--gold-dim), 0 8px 30px rgba(201,148,58,0.3);
    }

    .welcome-card h2 {
      font-family: 'Noto Serif TC', serif;
      font-size: 20px;
      font-weight: 900;
      color: var(--gold-light);
      margin-bottom: 8px;
    }

    .welcome-card p {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.7;
    }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
      justify-content: center;
    }

    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Noto Sans TC', sans-serif;
    }

    .chip:hover {
      border-color: var(--gold-dim);
      color: var(--gold-light);
      background: rgba(201,148,58,0.08);
    }

    /* messages */
    .msg-row {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.3s ease both;
    }

    .msg-row.user {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      align-self: flex-end;
    }

    .msg-row.boss .msg-avatar {
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      box-shadow: 0 0 12px rgba(201,148,58,0.2);
    }

    .msg-row.user .msg-avatar {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .bubble {
      max-width: min(72%, 480px);
      padding: 13px 17px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.75;
      position: relative;
    }

    .msg-row.boss .bubble {
      background: var(--boss-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: var(--radius-sm);
      color: var(--text);
    }

    .msg-row.user .bubble {
      background: linear-gradient(135deg, #3a2a10, #2a1f12);
      border: 1px solid var(--gold-dim);
      border-bottom-right-radius: var(--radius-sm);
      color: var(--gold-light);
    }

    .bubble .action {
      font-style: italic;
      color: var(--gold-dim);
    }

    .timestamp {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 5px;
      padding: 0 4px;
    }

    .msg-row.user .timestamp { text-align: right; }

    /* typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: var(--boss-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: var(--radius-sm);
      width: fit-content;
    }

    .typing-dot {
      width: 7px; height: 7px;
      background: var(--gold-dim);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── INPUT AREA ── */
    .input-area {
      flex-shrink: 0;
      padding: 14px 16px 18px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 10px 10px 10px 18px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 1px var(--gold-dim);
    }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px;
      font-weight: 300;
      resize: none;
      max-height: 130px;
      line-height: 1.6;
      padding: 2px 0;
    }

    #userInput::placeholder { color: var(--text-muted); }

    #sendBtn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(201,148,58,0.3);
    }

    #sendBtn:hover { transform: scale(1.08); box-shadow: 0 6px 18px rgba(201,148,58,0.4); }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    #sendBtn svg { width: 18px; height: 18px; fill: #0f0c0a; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 10px;
      letter-spacing: 0.02em;
    }

    /* ── DIVIDER ── */
    .day-divider {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      position: relative;
      margin: 4px 0;
    }

    .day-divider::before, .day-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: var(--border);
    }
    .day-divider::before { left: 0; }
    .day-divider::after { right: 0; }

    /* responsive */
    @media (max-width: 600px) {
      .bubble { max-width: 85%; }
      header { padding: 12px 14px; }
      .welcome-card { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="avatar">👩‍💼</div>
  <div class="header-info">
    <h1>葳老闆</h1>
    <p>台灣最直白的感情諮詢師</p>
  </div>
  <div class="header-badge">🔴 直播中</div>
</header>

<div id="messages">
  <div class="welcome-card">
    <div class="big-avatar">👩‍💼</div>
    <h2>歡迎來到葳老闆諮詢室</h2>
    <p>感情卡關了嗎？<br>說吧，我不咬人，但我說話可能很直。</p>
    <div class="suggestion-chips">
      <span class="chip" onclick="quickSend(this)">😤 被劈腿了怎麼辦</span>
      <span class="chip" onclick="quickSend(this)">💬 暗戀不敢表白</span>
      <span class="chip" onclick="quickSend(this)">🤔 該分手嗎</span>
      <span class="chip" onclick="quickSend(this)">📱 已讀不回怎麼辦</span>
      <span class="chip" onclick="quickSend(this)">😢 分手後好難忘記對方</span>
      <span class="chip" onclick="quickSend(this)">💑 異地戀值得嗎</span>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea
      id="userInput"
      placeholder="說說你的感情問題…"
      rows="1"
      maxlength="1000"
    ></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="input-hint">按 Enter 送出・Shift+Enter 換行</div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  // conversation history for multi-turn
  const history = [];

  function getTime() {
    return new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
  }

  function appendMessage(role, text) {
    const isBoss = role === 'assistant';
    const row = document.createElement('div');
    row.className = `msg-row ${isBoss ? 'boss' : 'user'}`;

    // process *action* text
    const processedText = text.replace(/\*([^*]+)\*/g, '<span class="action">*$1*</span>');

    row.innerHTML = `
      <div class="msg-avatar">${isBoss ? '👩‍💼' : '🙋'}</div>
      <div>
        <div class="bubble">${processedText.replace(/\n/g, '<br>')}</div>
        <div class="timestamp">${getTime()}</div>
      </div>
    `;
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row boss';
    row.id = 'typing-row';
    row.innerHTML = `
      <div class="msg-avatar">👩‍💼</div>
      <div>
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    `;
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing-row')?.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', text);
    history.push({ role: 'user', content: text });

    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });

      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        appendMessage('assistant', `*嘆氣* 啊，好像出了點問題：${data.error || '未知錯誤'}。你再試一次啦。`);
        history.pop();
      } else {
        appendMessage('assistant', data.reply);
        history.push({ role: 'assistant', content: data.reply });
      }
    } catch (e) {
      removeTyping();
      appendMessage('assistant', '*翻白眼* 網路出問題啦，再試一次！');
      history.pop();
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function quickSend(el) {
    const text = el.textContent.replace(/^[^\w\u4e00-\u9fff]+/, '').trim();
    inputEl.value = text;
    sendMessage();
    // hide welcome card after first use
    document.querySelector('.welcome-card')?.remove();
  }

  // auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + 'px';
  });

  // Enter to send
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
      document.querySelector('.welcome-card')?.remove();
    }
  });
</script>
</body>
</html>
